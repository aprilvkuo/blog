name: Daily Stock Analysis Sync

on:
  schedule:
    # 每天 UTC 时间 16:00 运行 (北京时间 00:00)
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  sync-stock-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Clone TradingAgents repository
        run: |
          git clone --depth 1 https://github.com/${{ github.repository_owner }}/TradingAgents.git /tmp/TradingAgents

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run sync script
        env:
          SYNC_HISTORY: 'true'
        run: |
          python3 scripts/sync-stocks.py

      - name: Check for changes
        id: git-status
        run: |
          if git status --porcelain finance/stock-analysis/ | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-status.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add finance/stock-analysis/
          git commit -m "chore: 自动更新股票分析报告 ($(date +%Y-%m-%d))"
          git push

      - name: No changes notice
        if: steps.git-status.outputs.has_changes == 'false'
        run: echo "✅ 无新变更，跳过提交"
